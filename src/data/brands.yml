- id: monkey_hold
  status: 1
  name: Monkey Hold
  url: https://monkey-hold.com/
  photo: hinoki_hold_m_1.webp
  instagram: monkeyhold_japan
  city:
  description_i18n:
    en: >
      Monkey Hold takes wooden climbing holds to the next level by adding a transparent grippy finish, without taking away from the material's natural beauty. 

      The result are holds that you can hold on to even on steeper walls, at a price that won't break the bank.
    fr: >
      Monkey Holds a perfectionné l'art de produire des prises en bois en leur ajoutant un finish texturé transparent, qui permet d'avoir plus de friction sans pour autant nuir a la beauté naturelle du matériau. 

      Le résultat est une gamme de prises utilisables même sur les dévers plus forts, à un prix qui reste très abordable.
    ja: >
      Monkey Holdは、木製クライミングホールドに透明でグリップ力のある仕上げを加えることで、素材本来の美しさを損なわずに次のレベルへ引き上げています。

      その結果、より強い傾斜の壁でも保持でき、価格も手頃なホールドが生まれています。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - powerful
  tags:
    - wooden_holds

