# monkey_hold
- id: hinoki_hold_m
  brand: monkey_hold
  name: Hinoki Hold M
  family: monkey_hinoki
  url: https://monkey-hold.com/?pid=178026316
  size: M
  price: 4950
  currency: JPY
  quantity: 4
  description_i18n:
    en: >
      This innovative wooden hold features an original friction coating and is made from hinoki cypress, a material known for its excellent texture and durability. The natural feel and warmth of the wood provide comfort and confidence for climbers. Hinoki is a material Japan is proud of, known for its calming scent, ability to support concentration, and versatility in shaping.
    fr: >
      Cette prise en bois innovante utilise une finition de friction originale et est fabriquée en cyprès hinoki, un bois japonais reconnu pour sa texture et sa durabilité. Sa sensation naturelle et sa chaleur apportent confort et confiance aux grimpeurs. Le hinoki est un matériau dont le Japon est fier, apprécié pour son parfum apaisant, sa capacité à favoriser la concentration et sa facilité de travail permettant de nombreuses formes.
    ja: >
      この商品はオリジナルフリクション塗装を施した画期的な木製ホールドで、質感、耐久性に優れた「ヒノキ材」を使用しています。
      手の馴染み方、木のぬくもりが、ボルダリングを楽しむすべての人に安心と快適さを提供します。
      ヒノキは日本が世界に誇る素材であり、その香りは心を落ち着かせ、集中力を高めると言われているとともに加工性にも富んでおり、様々な形への加工が可能です。
      木材が持つ自然の力で、利用者の方々のパフォーマンス向上をサポートします。
  photos:
    - hinoki_hold_m_1.webp
    - hinoki_hold_m_2.webp
    - hinoki_hold_m_3.webp
    - hinoki_hold_m_4.webp

- id: cobu_hold
  brand: monkey_hold
  name: Cobu Hold
  family: monkey_cobu
  url: https://monkey-hold.com/?pid=178094990
  size: M
  price: 17050
  currency: JPY
  quantity: 4
  description_i18n:
    en: >
      Have you ever seen a burl in wood? It is a small natural miracle created by trees. We found new value in this part that may seem unnecessary as a building material. By using these burls, we created COBU-HOLD, where no two shapes are exactly the same.
    fr: >
      Avez-vous déjà vu une loupe de bois ? C’est un petit miracle naturel créé par les arbres. Nous avons découvert une nouvelle valeur dans cette partie souvent considérée comme inutile pour les matériaux de construction. En utilisant ces loupes, nous avons créé le « COBU-HOLD », dont chaque forme est absolument unique.
    ja: >
      木の瘤（こぶ）を見たことはありますか？ 自然界に生まれる、木の持つ小さな奇跡です。
      建築材料としては一見不要に思えるこの部分に、私たちは新たな価値を見出しました。
      そしてこの瘤を活用し、絶対に同じ形が存在しない「COBU-HOLD」が誕生しました。
  photos:
    - cobu_hold_1.webp

