- id: hazama_holds
  status: 1
  name: Hazama Holds
  url: https://seen-perfume-126.notion.site/Hazama-holds-29f13ea8327180b28c25dfff4cb28e77
  photo: plates_edges_1.webp
  instagram: hazamaholds
  city:
  description_i18n:
    en: >
      Hazama Holds offer a large variety of realistic, rock_like holds, each carefully designed to offer a different climbing experience.

      These holds are perfect to set precise, technical climbs that emulate outdoor climbing while remaining gentle on the fingers.
    fr: >
      Hazama Holds offre une large variété de prises réalistes, chacunes conçues pour offrir une expérience différente à chaque fois. 

      Ces prises sont parfaites pour ouvrir des blocs techniques et précis, qui simulent la grimpe en extérieur tout en ménageant la peau.
    ja: >
      Hazama Holdsは、さまざまなリアルな岩のような形状のホールドを提供しており、それぞれが異なるクライミング体験を生み出すよう丁寧に設計されています。

      これらのホールドは、指への負担を抑えながら、外岩のような感覚を再現する正確でテクニカルな課題をセットするのに最適です。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - precision
  tags:
    - small_holds
    - rock_like

- id: mojo_holds
  status: 1
  name: Mojo Holds
  url: https://mojohold.myshopify.com/
  instagram: mojo_hold
  photo: twoface_incut_sloper_m_1.webp
  city:
  description_i18n:
    en: >
      Mojo is one of Japan's fastest-growing hold makers, and their holds offer a new take on the dual-tex hold, featuring a very unique blend of no-texture surface combined with realistic rock shapes. 

      They are perfect to introduce gym-goers to more rock_like sensations while preserving the fun, flowy style that makes large macros so great in the first place.
    fr: >
      Mojo est une des marques locales connaissant le plus de succès au Japon actuellement, et leur prises proposent une nouvelle vision du dual-tex, avec un mélange asez unique de surface non-texturée et de zone émulant la roche naturelle. 

      C'est un moyen parfait de proposer aux grimpeurs en salle des sensations plus proches de la grimpe en extérieur, tout en préservant le style fun et fluide auquel ils sont habitués.
    ja: >
      Mojoは日本で急成長しているホールドメーカーの一つで、非常にユニークなデュアルテクスチャホールドを展開しています。

      自然な岩の形状と、摩擦のない表面の組み合わせが特徴です。ジムのクライマーに、外岩に近い感覚を取り入れながらも、楽しく流れるようなスタイルを楽しんでもらうのに最適です。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - powerful
    - precision
  tags:
    - rock_like

