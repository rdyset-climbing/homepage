- id: iwakagami
  status: 1
  name: Iwakagami
  url: https://iwakagami.base.shop/
  instagram: iwakagami_holds
  photo: granite_gr_3_2.jpg
  city:
  description_i18n:
    en: >
      Iwakagami's goal is to simulate outdoor climbing, and they achieve this by painstakingly crafting each hold to be as close to real rock as possible.

      The result is an indoor climbing experience that requires careful finger and body positioning on a level rarely seen indoors, yet remains easy on the skin.
    fr: >
      La mission d'Iwakagami est de simuler la grimpe en extérieur, et pour se faire ils travaillent chaque prise individuellement afin de lui donner un aspect le plus proche de la vraie roche possible.

      Le résultat est une grimpe en intérieur qui demande d'ajuster la position des doigts et du corps au millimètre près, tout en préservant la peau.
    ja: >
      Iwakagamiの目標は外岩クライミングを再現することであり、そのために各ホールドを本物の岩にできるだけ近づけるよう丁寧に作り込んでいます

      その結果、屋内では珍しいほど細かな指や体のポジション調整が求められながらも、皮膚には優しいクライミング体験が生まれます。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - precision
  tags:
    - rock_like
    - macros

- id: tataanz
  status: 1
  name: Tataanz
  url: https://www.tataanz.com/
  photo: freeflap_jug_3.jpg
  instagram: tataanz_climbinghold
  city: Kurayoshi
  description_i18n:
    en: >
      Tataanz blurs the line between volume and hold, producing rounded, friendly shapes that immediately make you want to jump on the wall and figure out how to grip them. 

      Their holds are perfect to offer a volume-like climbing experience without requiring as much body tension and physicality as traditional plywood shapes.
    fr: >
      Tataanz joue a brouiller la ligne entre prise et volume en produisant des formes rondes et ludiques qui donnent envie de sauter sur le mur les essayer dès qu'on les aperçoit. 

      Leur prises sont parfaites pour offrir une expérience de grimpe sur volumes, tout en demandant moins de contraction et de tension que les volumes traditionels.
    ja:
      Tataanzはボテとホールドの境界を曖昧にし、見た瞬間に壁に飛びついて持ち方を試したくなるような、丸みのある親しみやすい形状を生み出しています。

      同社のホールドは、従来の木製形状ほど身体の張りやフィジカルを必要とせず、ボテに近いクライミング体験を提供するのに最適です。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - dynamic
    - flowy
  tags:
    - wooden_holds
    - volumes
    - macros

