- id: ubh
  status: 1
  name: Under Blue Holds
  url: https://ubh.jp/
  photo: tuna_dt_1.webp
  instagram: ubh.global
  city: Tokyo
  description_i18n:
    en: >
      Under Blue Holds is probably Japan's best-known hold maker thanks to their distinctive “tuna” macro, which has even appeared in world cups.

      They specialize in volumes and macros, making them a great option for setting modern, comp-style climbs.
    fr: >
      Under Blue Holds est probablement la marque de prises la plus connue du Japon, en large partie grace à leur prise “maguro” (“thon” en Japonais) qui a meme fait partie de blocs de coupe du monde.

      Ils se spécialisent dans les volumes et les prises de large envergure, ce qui en fait une option idéale pour ouvrir des blocs de compétition modernes.
    ja: >
      Under Blue Holdsは、その特徴的な「マグロ」ボテ（世界大会にも登場したことがあります）のおかげで、おそらく日本で最も知られているホールドメーカーです。

      ボテや大型ホールドを専門としており、現代的なコンペスタイルの課題に最適な選択肢です。

