- id: k16
  status: 1
  name: K16
  url: https://k16climbinghold.stores.jp/
  photo: noah_2_1.png
  instagram: https://www.instagram.com/k16_climbinghold
  city:
  description_i18n:
    en: >
      One of Japan's up-and-coming brands, K16 offers beautiful fiberglass holds that will make an impression as soon as you walk into a gym.

      Their no-tex range stands out as a sleek way to break up a climb, or even create an entire boulder that will challenge climbers in brand new ways.
    fr: >
      Une autre marque Japonais en plein dévelopmment, K16 propose des prises en fibre de verre qui se remarquent dès qu'on lève les yeux.

      Leur gamme no-tex (prises non texturées) sort notamment du lot, et permet soit de rompre la monotonie d'un bloc, soit même de créer tout un bloc sans texture qui posera a coup sûr de nouveaux challenges à tout grimpeur.
    ja: >
      日本で成長中のブランドの一つであるK16は、ジムに入った瞬間に印象を残す美しいグラスファイバー製ホールドを提供しています。

      ノーテクスチャシリーズは、課題のアクセントとして使う方法から、クライマーにまったく新しい挑戦を与える一つのボルダー全体を作る方法まで、洗練された使い方ができます。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - dynamic
    - powerful
  tags:
    - macros
