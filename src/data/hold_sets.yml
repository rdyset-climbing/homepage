# monkey_hold
- id: hinoki_hold_m
  brand: monkey_hold
  name: Hinoki Hold M
  family: monkey_hinoki
  url: https://monkey-hold.com/?pid=178026316
  size: M
  price: 4950
  currency: JPY
  quantity: 4
  description_i18n:
    ja: >
      この商品はオリジナルフリクション塗装を施した画期的な木製ホールドで、質感、耐久性に優れた「ヒノキ材」を使用しています。
      手の馴染み方、木のぬくもりが、ボルダリングを楽しむすべての人に安心と快適さを提供します。
      ヒノキは日本が世界に誇る素材であり、その香りは心を落ち着かせ、集中力を高めると言われているとともに加工性にも富んでおり、様々な形への加工が可能です。
      木材が持つ自然の力で、利用者の方々のパフォーマンス向上をサポートします。
  photos:
    - hinoki_hold_m_1.webp
    - hinoki_hold_m_2.webp
    - hinoki_hold_m_3.webp
    - hinoki_hold_m_4.webp

