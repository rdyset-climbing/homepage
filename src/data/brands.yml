    en: >
      Fat Cap is famous for its teddy-bear holds, but don't be fooled by their cute appearance: wrestling those bears can be (almost) as challenging as fighting the real animal. 

      Fat Cap also sells hardware for volume and climbing wall manufacturing.
    ja: >
      Fat Capはクマ型ホールドで有名ですが、そのかわいらしい見た目に惑わされてはいけません。これらのクマと格闘するのは、本物の動物と戦うのと（ほぼ）同じくらい難しいことがあります。

      Fat Capはボテやクライミングウォール製作向けの金物も販売しています。
