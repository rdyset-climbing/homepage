- id: volny
  status: 1
  name: Volny
  url: https://volny.base.shop/categories/3236401
  photo: amoeba_1.jpg
  instagram: volny_holds/
  city:
  description_i18n:
    en: >
      Volny may be famous for being the Japanese gym featuring the World's Densest Spray Wall, but their hold-making division is definitely worth paying attention to as well. 

      Specializing in smaller-scale crimps, each Volny hold is meticulously designed to force climbers' fingers in specific positions or otherwise present new climbing challenges, proving that smaller holds can be just as interesting to climb on as their larger counterparts.
    fr: >
      Volny est connu pour être la salle possédant le spraywall le plus dense au monde, mais leur collection de prises mérite également le détour. 

      Volny se spécialise dans les prises plus petites, et cela se ressent dans leur gamme, où chaque prise est méticuleusement étudiée pour forcer une position des doigts spécifiques ou poser de nouveaux challenges aux grimpeurs. Comme quoi les petites prises peuvent être toutes aussi intéressantes que les grandes!
    ja: >
      Volnyは世界で最も密度の高いまぶし壁を持つ日本のジムとして知られているかもしれませんが、ホールド製作部門も注目に値します。

      小さめのカチ系ホールドを得意としており、それぞれのホールドは指の位置を特定の形に導いたり、新しい課題を生み出したりするよう綿密に設計されています。小さなホールドでも大きなホールドと同じくらい面白いクライミングを提供できることを証明しています。
  founder:
    name_i18n:
      en:
      ja:
    bio_i18n:
      en: >
      ja: >
      fr: >
    photo:
  moves:
    - precision
    - powerful
  tags:
    - small_holds

